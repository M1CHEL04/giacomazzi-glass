networks:
  proxy_net:
    driver: bridge
  prod_net:
    driver: bridge
    internal: true        # app-prod ↔ mysql-prod, sin salida a internet
  test_net:
    driver: bridge
    internal: true        # app-test ↔ mysql-test, sin salida a internet
  prod_fileserver_net:
    driver: bridge
    internal: true        # app-prod ↔ fileserver-prod, sin salida a internet
  test_fileserver_net:
    driver: bridge
    internal: true        # app-test ↔ fileserver-test, sin salida a internet
  db_management_net:
    driver: bridge        # sin internal — permite que los puertos lleguen al host

volumes:
  mysql_prod_data:
  mysql_test_data:
  fileserver_prod_data:  # imágenes de producto prod — persisten entre reinicios
  fileserver_test_data:  # imágenes de producto test — persisten entre reinicios
  certbot_conf:          # certificados SSL — persisten entre reinicios
  certbot_www:           # archivos de validación ACME

services:

  # ── Reverse Proxy ──────────────────────────────────────────────────────────
  nginx-proxy:
    image: nginx:1.27-alpine
    container_name: giacomazzi-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/proxy/nginx-https.conf:/etc/nginx/nginx.conf:ro
      - fileserver_prod_data:/var/www/files/prod:ro
      - fileserver_test_data:/var/www/files/test:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - proxy_net
    restart: unless-stopped

  # ── Certbot (Let's Encrypt) ────────────────────────────────────────────────
  # Solo se usa con: docker compose run --rm certbot certonly ...
  # La renovación la maneja un cron en el host (ver abajo)
  certbot:
    image: certbot/certbot
    container_name: giacomazzi-certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot

  # ── File server PROD ───────────────────────────────────────────────────────
  fileserver-prod:
    image: atmoz/sftp:alpine
    container_name: giacomazzi-fileserver-prod
    command: "giacomazzi:${FILESERVER_PROD_SFTP_PASSWORD}:1001:::upload"
    volumes:
      - fileserver_prod_data:/home/giacomazzi/upload
      - ./docker/fileserver/init-perms.sh:/etc/sftp.d/init-perms.sh:ro
    ports:
      - "127.0.0.1:2223:22"  # solo localhost — admin/backup, nunca público
    networks:
      - prod_fileserver_net
    restart: unless-stopped

  # ── File server TEST ───────────────────────────────────────────────────────
  fileserver-test:
    image: atmoz/sftp:alpine
    container_name: giacomazzi-fileserver-test
    command: "giacomazzi:${FILESERVER_TEST_SFTP_PASSWORD}:1001:::upload"
    volumes:
      - fileserver_test_data:/home/giacomazzi/upload
      - ./docker/fileserver/init-perms.sh:/etc/sftp.d/init-perms.sh:ro
    ports:
      - "127.0.0.1:2222:22"  # solo localhost — dev local conecta aquí
    networks:
      - test_fileserver_net
    restart: unless-stopped

  # ── PROD ───────────────────────────────────────────────────────────────────
  app-prod:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: giacomazzi-app-prod
    env_file: .env.prod
    networks:
      - proxy_net
      - prod_net
      - prod_fileserver_net
    depends_on:
      mysql-prod:
        condition: service_healthy
      fileserver-prod:
        condition: service_started
    restart: unless-stopped

  mysql-prod:
    image: mysql:8.0
    container_name: giacomazzi-mysql-prod
    env_file: .env.prod
    volumes:
      - mysql_prod_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3307:3306"   # solo localhost — acceso remoto vía túnel SSH
    networks:
      - prod_net
      - db_management_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_prod"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  # ── TEST ───────────────────────────────────────────────────────────────────
  app-test:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: giacomazzi-app-test
    env_file: .env.test
    networks:
      - proxy_net
      - test_net
      - test_fileserver_net
    depends_on:
      mysql-test:
        condition: service_healthy
      fileserver-test:
        condition: service_started
    restart: unless-stopped

  mysql-test:
    image: mysql:8.0
    container_name: giacomazzi-mysql-test
    env_file: .env.test
    volumes:
      - mysql_test_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3308:3306"   # solo localhost — acceso remoto vía túnel SSH
    networks:
      - test_net
      - db_management_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_test"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped
