# TEST — se corre desde ~/giacomazzi-glass-test (worktree de la rama test).
# Efímero: se levanta on-demand. Deploy: ./scripts/deploy-test.sh
# Bajar: ./scripts/test-down.sh (deja fileserver-test arriba para el dev local).
name: giaco-test

networks:
  proxy_net:
    external: true          # compartida con compose.prod.yml (el proxy alcanza app-test)
  test_net:
    driver: bridge
    internal: true          # app-test ↔ mysql-test, sin salida a internet
  test_fileserver_net:
    driver: bridge
    internal: true          # app-test ↔ fileserver-test, sin salida a internet
  db_management_net:
    driver: bridge          # sin internal — permite que el puerto de la BD llegue al host

volumes:
  mysql_test_data:
  fileserver_test_data:     # imágenes de producto test — compartidas con el dev local (SFTP 2222)

services:

  # ── File server TEST ───────────────────────────────────────────────────────
  # Doble uso: lo consume app-test (server) y el dev local (Laragon) vía SFTP 2222.
  fileserver-test:
    image: atmoz/sftp:alpine
    container_name: giacomazzi-fileserver-test
    command: "giacomazzi:${FILESERVER_TEST_SFTP_PASSWORD}:1001:::upload"
    volumes:
      - fileserver_test_data:/home/giacomazzi/upload
      - ./docker/fileserver/init-perms.sh:/etc/sftp.d/init-perms.sh:ro
    ports:
      - "127.0.0.1:2222:22"  # solo localhost — dev local conecta aquí
    networks:
      - test_fileserver_net
    restart: unless-stopped

  # ── App TEST ───────────────────────────────────────────────────────────────
  app-test:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: giacomazzi-app-test
    env_file: .env.test
    volumes:
      - fileserver_test_data:/var/www/files:ro   # sirve /files/ desde su nginx interno
    networks:
      - proxy_net
      - test_net
      - test_fileserver_net
    depends_on:
      mysql-test:
        condition: service_healthy
      fileserver-test:
        condition: service_started
    restart: unless-stopped

  mysql-test:
    image: mysql:8.0
    container_name: giacomazzi-mysql-test
    env_file: .env.test
    volumes:
      - mysql_test_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3308:3306"   # solo localhost — acceso remoto vía túnel SSH
    networks:
      - test_net
      - db_management_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_test"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped
