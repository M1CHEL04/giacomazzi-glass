worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    log_format main '$remote_addr - $remote_host [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── PROD: dominio de Hostinger ─────────────────────────────────────────
    # Reemplazá "tu-dominio.com" con el dominio gratuito que te da Hostinger.
    # En el panel de Hostinger apuntá el registro A a la IP de tu VPS.
    upstream app_prod {
        server app-prod:80;
    }

    server {
        listen 80;
        server_name tu-dominio.com www.tu-dominio.com;

        location / {
            proxy_pass         http://app_prod;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            client_max_body_size 20M;
        }
    }

    # ── TEST: subdominio de DuckDNS ────────────────────────────────────────
    # 1. Registrate en https://www.duckdns.org con Google/GitHub (gratis).
    # 2. Creá un subdominio, ej: "giacomazzi-test" → giacomazzi-test.duckdns.org
    # 3. Pegá la IP pública de tu VPS en el campo "current ip" y guardá.
    # 4. Reemplazá "giacomazzi-test.duckdns.org" con el tuyo.
    upstream app_test {
        server app-test:80;
    }

    server {
        listen 80;
        server_name giacomazzi-test.duckdns.org;

        location / {
            proxy_pass         http://app_test;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            client_max_body_size 20M;
        }
    }
}
