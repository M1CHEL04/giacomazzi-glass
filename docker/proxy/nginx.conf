worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Docker's internal DNS — resuelve upstreams en cada request, no al iniciar.
    # Así nginx arranca aunque app-prod o app-test no estén corriendo todavía.
    resolver 127.0.0.11 valid=30s ipv6=off;

    log_format main '$remote_addr - $host [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── PROD ───────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name tu-dominio.com www.tu-dominio.com;

        # Imágenes de producto — servidas directo del volumen, sin pasar por la app
        location /files/ {
            alias /var/www/files/prod/;
            try_files $uri =404;
            autoindex off;
            add_header X-Content-Type-Options "nosniff";
            add_header X-Frame-Options "DENY";
        }

        location / {
            set $upstream http://app-prod;
            proxy_pass         $upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            client_max_body_size 20M;
        }
    }

    # ── TEST ───────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name giacomazzi-test.duckdns.org;

        # Imágenes de producto — servidas directo del volumen, sin pasar por la app
        location /files/ {
            alias /var/www/files/test/;
            try_files $uri =404;
            autoindex off;
            add_header X-Content-Type-Options "nosniff";
            add_header X-Frame-Options "DENY";
        }

        location / {
            set $upstream http://app-test;
            proxy_pass         $upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            client_max_body_size 20M;
        }
    }
}
