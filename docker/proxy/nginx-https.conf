worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    resolver 127.0.0.11 valid=30s ipv6=off;

    log_format main '$remote_addr - $host [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # Configuración SSL recomendada
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── PROD — HTTP → HTTPS ────────────────────────────────────────────────────
    server {
        listen 80;
        server_name tu-dominio.com www.tu-dominio.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── PROD — HTTPS ───────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name tu-dominio.com www.tu-dominio.com;

        ssl_certificate     /etc/letsencrypt/live/tu-dominio.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/tu-dominio.com/privkey.pem;

        location /files/ {
            alias /var/www/files/prod/;
            try_files $uri =404;
            autoindex off;
            add_header X-Content-Type-Options "nosniff";
            add_header X-Frame-Options "DENY";
        }

        location / {
            set $upstream http://app-prod;
            proxy_pass         $upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            client_max_body_size 20M;
        }
    }

    # ── TEST — HTTP → HTTPS ────────────────────────────────────────────────────
    server {
        listen 80;
        server_name giacomazzi-test.duckdns.org;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── TEST — HTTPS ───────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name giacomazzi-test.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/giacomazzi-test.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/giacomazzi-test.duckdns.org/privkey.pem;

        location /files/ {
            alias /var/www/files/test/;
            try_files $uri =404;
            autoindex off;
            add_header X-Content-Type-Options "nosniff";
            add_header X-Frame-Options "DENY";
        }

        location / {
            set $upstream http://app-test;
            proxy_pass         $upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto https;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            client_max_body_size 20M;
        }
    }
}
