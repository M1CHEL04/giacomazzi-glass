server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 20M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Static assets — cache aggressively
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Storage files (imágenes subidas).
    # Apunta directamente al directorio del bind mount, sin depender del symlink.
    location /storage {
        alias /var/www/html/storage/app/public/;
        try_files $uri =404;
    }

    # File server (imágenes de producto vía SFTP). Se monta fileserver_*_data en :ro.
    # ^~ le da prioridad sobre la regex de assets estáticos (si no, /files/x.jpg la
    # capturaría esa regex y daría 404).
    location ^~ /files/ {
        alias /var/www/files/;
        try_files $uri =404;
        autoindex off;
        add_header X-Content-Type-Options "nosniff";
        add_header X-Frame-Options "DENY";
    }

    # PHP — all requests proxied to PHP-FPM (same container, 127.0.0.1)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 60;
    }

    # Block hidden files
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}
